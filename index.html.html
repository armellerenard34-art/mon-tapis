<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mon Programme Tapis</title>
<meta name="description" content="Programme de marche sur tapis 8 semaines, adapté à la périménopause">
<meta name="theme-color" content="#2D5247">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mon Tapis">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22Mon%20Programme%20Tapis%22%2C%22short_name%22%3A%22Mon%20Tapis%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23F7F4EF%22%2C%22theme_color%22%3A%22%232D5247%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%2520viewBox%3D'0%200%20512%20512'%253E%253Crect%2520width%3D'512'%2520height%3D'512'%2520fill%3D'%25232D5247'%2520rx%3D'100'%2F%253E%253Ctext%2520x%3D'50%25'%2520y%3D'55%25'%2520font-size%3D'300'%2520text-anchor%3D'middle'%2520dominant-baseline%3D'middle'%253E%25F0%259F%25A5%25BF%253C%2Ftext%253E%253C%2Fsvg%253E%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F4EF;
    --warm-white: #FDFCF9;
    --sage: #4A7C6F;
    --sage-light: #E4EDE9;
    --sage-dark: #2D5247;
    --terracotta: #C4654A;
    --terracotta-light: #F5E8E3;
    --charcoal: #2A2A28;
    --muted: #8A8880;
    --border: rgba(42,42,40,0.12);
    --shadow: 0 2px 20px rgba(42,42,40,0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    font-size: 15px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: var(--sage-dark);
    color: var(--warm-white);
    padding: 3rem 1.5rem 2rem;
    padding-top: max(3rem, env(safe-area-inset-top, 3rem));
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 10px;
  }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    line-height: 1.15;
    margin-bottom: 8px;
  }
  .header-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    font-weight: 300;
  }

  .overall-progress {
    background: var(--warm-white);
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .progress-label { font-size: 12px; color: var(--muted); }
  .progress-pct { font-size: 13px; font-weight: 500; color: var(--sage-dark); }
  .progress-track {
    height: 5px;
    background: var(--sage-light);
    border-radius: 5px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--sage);
    border-radius: 5px;
    transition: width 0.5s ease;
  }

  .week-nav {
    display: flex;
    gap: 6px;
    padding: 1rem 1.5rem;
    overflow-x: auto;
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .week-nav::-webkit-scrollbar { display: none; }
  .week-btn {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .week-btn.active { background: var(--sage-dark); color: white; border-color: var(--sage-dark); font-weight: 500; }
  .week-btn.done { background: var(--sage-light); color: var(--sage-dark); border-color: var(--sage); }

  main { padding: 1.5rem 1.5rem 5rem; max-width: 640px; margin: 0 auto; }

  .phase-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 14px;
    font-weight: 500;
  }
  .phase-1 { background: var(--sage-light); color: var(--sage-dark); }
  .phase-2 { background: #EDE8F5; color: #3D2F72; }
  .phase-3 { background: var(--terracotta-light); color: #8B3A24; }

  .week-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    line-height: 1.25;
    margin-bottom: 6px;
  }
  .week-desc {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 1.5rem;
    font-weight: 300;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .stat-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 0.75rem;
    text-align: center;
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.75rem;
    color: var(--charcoal);
    line-height: 1;
    margin-bottom: 2px;
  }
  .stat-unit { font-size: 11px; color: var(--muted); }

  .info-block {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.1rem 1.25rem;
    margin-bottom: 12px;
  }
  .info-block-label {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .info-block-text { font-size: 14px; color: var(--charcoal); line-height: 1.6; }
  .info-block.tip { border-left: 3px solid var(--sage); border-radius: 0 14px 14px 0; }
  .info-block.pattern { border-left: 3px solid var(--terracotta); border-radius: 0 14px 14px 0; }

  .effort-section { margin: 1.25rem 0; }
  .effort-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .effort-name { font-size: 12px; color: var(--muted); }
  .effort-pct { font-size: 12px; font-weight: 500; }
  .effort-track { height: 8px; background: var(--sage-light); border-radius: 8px; overflow: hidden; }
  .effort-fill { height: 100%; border-radius: 8px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

  .done-btn {
    width: 100%;
    margin-top: 1.5rem;
    padding: 16px;
    border-radius: 14px;
    border: 1.5px solid var(--sage);
    background: transparent;
    color: var(--sage-dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .done-btn.completed { background: var(--sage-dark); color: white; border-color: var(--sage-dark); }

  .rest-note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 1rem;
    font-style: italic;
  }

  .footer-note {
    margin-top: 2rem;
    padding: 1rem 1.25rem;
    background: var(--terracotta-light);
    border-radius: 14px;
    font-size: 12px;
    color: #8B3A24;
    line-height: 1.6;
  }
  .footer-note strong { font-weight: 500; }

  /* Bannière installation iOS */
  .install-banner {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--sage-dark);
    color: white;
    padding: 1rem 1.5rem;
    padding-bottom: max(1rem, env(safe-area-inset-bottom, 1rem));
    z-index: 200;
    font-size: 13px;
    line-height: 1.5;
  }
  .install-banner.visible { display: flex; align-items: center; gap: 12px; }
  .install-banner-text { flex: 1; }
  .install-banner-close {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    border-radius: 100px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    flex-shrink: 0;
  }

  .week-content { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <p class="header-eyebrow">Programme personnel</p>
  <h1 class="header-title">8 semaines<br><em>sur le tapis</em></h1>
  <p class="header-subtitle">Adapté à la périménopause · Départ progressif</p>
</header>

<div class="overall-progress">
  <div class="progress-meta">
    <span class="progress-label" id="progressLabel">0 / 8 semaines validées</span>
    <span class="progress-pct" id="progressPct">0% accompli</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%;"></div>
  </div>
</div>

<nav class="week-nav" id="weekNav"></nav>
<main><div id="weekContent"></div></main>

<div class="install-banner" id="installBanner">
  <div class="install-banner-text">📱 Installe cette appli : appuie sur <strong>Partager</strong> puis <strong>"Sur l'écran d'accueil"</strong></div>
  <button class="install-banner-close" onclick="document.getElementById('installBanner').classList.remove('visible'); localStorage.setItem('banner_dismissed','1')">OK</button>
</div>

<script>
const STORAGE_KEY = 'tapis_done_v2';

const weeks = [
  { phase:1, phaseLabel:"Phase 1 — Mise en route", title:"Apprivoise ton tapis", desc:"L'objectif n'est pas la performance, c'est la régularité. 3 séances, c'est tout.", seances:3, duree:20, vitesse:"4,5", effort:30, pattern:"Vitesse constante pendant toute la séance. Aucun intervalle cette semaine.", tip:"Choisis des créneaux fixes dans ta semaine (ex. : le matin avant de démarrer). La constance crée l'habitude.", repos:"4 jours de repos complets." },
  { phase:1, phaseLabel:"Phase 1 — Mise en route", title:"Installer la routine", desc:"Même volume, on commence à introduire un peu de variation de rythme.", seances:3, duree:22, vitesse:"4,5–5", effort:35, pattern:"18 min à 4,5 km/h + 2 × 1 min à 5 km/h + retour à 4,5 km/h.", tip:"Si tu as du mal à tenir 22 min, reste à 20 min. Mieux vaut finir que forcer.", repos:"4 jours de repos." },
  { phase:2, phaseLabel:"Phase 2 — Progression", title:"On monte le volume", desc:"On passe à 4 séances. Le corps commence à s'adapter.", seances:4, duree:25, vitesse:"4,5–5,5", effort:45, pattern:"15 min à 4,5 km/h + 3 × 2 min à 5,5 km/h (récup 1 min entre chaque).", tip:"La transpiration légère est normale et signe que ton métabolisme travaille. Hydrate-toi avant et après.", repos:"3 jours de repos." },
  { phase:2, phaseLabel:"Phase 2 — Progression", title:"Récupération active", desc:"Chaque 4e semaine, on réduit intentionnellement. Le corps consolide ses acquis.", seances:3, duree:22, vitesse:"4,5", effort:30, pattern:"Allure confortable, pas d'intervalles. Séance douce et régulière.", tip:"Cette semaine 'facile' prévient le surmenage hormonal, particulièrement important en périménopause. Ne la saute pas.", repos:"4 jours de repos." },
  { phase:2, phaseLabel:"Phase 2 — Progression", title:"Intervalles renforcés", desc:"Les intervalles sont le levier n°1 pour le métabolisme après 40 ans.", seances:4, duree:28, vitesse:"4,5–6", effort:55, pattern:"10 min échauffement + 4 × (2 min à 6 km/h / 3 min à 4,5 km/h) + 5 min retour calme.", tip:"Pendant les phases rapides, tu dois sentir que tu travailles sans pouvoir tenir une conversation normalement.", repos:"3 jours de repos." },
  { phase:2, phaseLabel:"Phase 2 — Progression", title:"On allonge la durée", desc:"4 séances. On commence à dépasser les 30 minutes sur certaines séances.", seances:4, duree:30, vitesse:"4,5–6", effort:60, pattern:"2 séances longues de 30 min à allure modérée + 2 séances intervalles de 25 min.", tip:"Les séances longues se font à allure modérée (tu peux parler mais pas chanter). C'est la zone de combustion des graisses.", repos:"3 jours de repos." },
  { phase:3, phaseLabel:"Phase 3 — Consolidation", title:"Volume maximal", desc:"Tu es maintenant capable de maintenir un rythme soutenu. On pousse un peu plus.", seances:4, duree:30, vitesse:"5–6,5", effort:70, pattern:"1 séance longue 30 min + 3 séances intervalles (5 × 2 min intense / 2 min récup).", tip:"Associe idéalement 1 séance de renforcement musculaire (squats, fentes, gainage 15 min). C'est le combo optimal en périménopause.", repos:"3 jours de repos." },
  { phase:3, phaseLabel:"Phase 3 — Consolidation", title:"Bilan et nouveau départ", desc:"Bravo d'être arrivée jusqu'ici. C'est maintenant ta base de départ, pas une arrivée.", seances:4, duree:30, vitesse:"5–6,5", effort:65, pattern:"Programme libre selon comment tu te sens — l'autonomie est l'objectif final.", tip:"Reprends tes mesures de départ et compare. Continue : les effets métaboliques s'observent surtout entre 8 et 16 semaines.", repos:"3 jours de repos." }
];

const effortColors = { 30:'#4A7C6F', 35:'#4A7C6F', 45:'#534AB7', 55:'#534AB7', 60:'#C4654A', 65:'#C4654A', 70:'#8B3A24' };
let currentWeek = 0;

function getDone() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); } catch { return []; } }
function setDone(idx, val) {
  const arr = getDone();
  if (val && !arr.includes(idx)) arr.push(idx);
  if (!val) { const i = arr.indexOf(idx); if(i>-1) arr.splice(i,1); }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

function renderNav() {
  const done = getDone();
  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';
  weeks.forEach((w,i) => {
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (i===currentWeek?' active':'') + (done.includes(i)&&i!==currentWeek?' done':'');
    btn.textContent = done.includes(i) ? `S${i+1} ✓` : `Semaine ${i+1}`;
    btn.onclick = () => { currentWeek=i; renderAll(); nav.children[i].scrollIntoView({behavior:'smooth',inline:'center'}); };
    nav.appendChild(btn);
  });
}

function renderProgress() {
  const done = getDone();
  const pct = Math.round((done.length/8)*100);
  document.getElementById('progressLabel').textContent = `${done.length} / 8 semaines validées`;
  document.getElementById('progressPct').textContent = pct+'% accompli';
  document.getElementById('progressFill').style.width = pct+'%';
}

function renderWeek() {
  const w = weeks[currentWeek];
  const done = getDone();
  const isDone = done.includes(currentWeek);
  const ec = effortColors[w.effort]||'#4A7C6F';
  document.getElementById('weekContent').innerHTML = `
    <div class="week-content">
      <span class="phase-badge phase-${w.phase}">${w.phaseLabel}</span>
      <h2 class="week-title">Semaine ${currentWeek+1} — ${w.title}</h2>
      <p class="week-desc">${w.desc}</p>
      <div class="stats-grid">
        <div class="stat-card"><p class="stat-label">Séances</p><p class="stat-value">${w.seances}</p><p class="stat-unit">/ semaine</p></div>
        <div class="stat-card"><p class="stat-label">Durée</p><p class="stat-value">${w.duree}</p><p class="stat-unit">min / séance</p></div>
        <div class="stat-card"><p class="stat-label">Vitesse</p><p class="stat-value" style="font-size:1.1rem;padding-top:8px;">${w.vitesse}</p><p class="stat-unit">km/h</p></div>
      </div>
      <div class="info-block pattern"><p class="info-block-label">Déroulé de la séance</p><p class="info-block-text">${w.pattern}</p></div>
      <div class="info-block tip"><p class="info-block-label">Conseil de la semaine</p><p class="info-block-text">${w.tip}</p></div>
      <div class="effort-section">
        <div class="effort-header"><span class="effort-name">Effort perçu</span><span class="effort-pct" style="color:${ec}">${w.effort}%</span></div>
        <div class="effort-track"><div class="effort-fill" style="width:${w.effort}%;background:${ec};"></div></div>
      </div>
      <p class="rest-note">${w.repos}</p>
      <button class="done-btn ${isDone?'completed':''}" onclick="toggleDone()">${isDone?'✓ Semaine validée':'Marquer cette semaine comme terminée'}</button>
      <div class="footer-note"><strong>Rappel médical :</strong> Ce programme est à but indicatif. En cas de douleurs articulaires, fatigue inhabituelle ou symptômes liés à la périménopause, consulte ton médecin ou gynécologue avant de continuer.</div>
    </div>`;
}

function toggleDone() { setDone(currentWeek, !getDone().includes(currentWeek)); renderAll(); }
function renderAll() { renderNav(); renderProgress(); renderWeek(); }

renderAll();

// Bannière installation iOS
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
const dismissed = localStorage.getItem('banner_dismissed');
if (isIOS && !isStandalone && !dismissed) {
  setTimeout(() => document.getElementById('installBanner').classList.add('visible'), 2000);
}

// Service Worker pour fonctionnement hors ligne
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'tapis-v1';
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(['.']))));
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
</body>
</html>
